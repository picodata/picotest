[workspace]
resolver = "2"
members = [
    "picotest", 
    "picotest_macros", 
    "picotest_helpers", 
]

exclude = [
    "tmp/test_plugin"
]

[workspace.dependencies]
anyhow = { version = "1.0.98" }
picodata-pike = { git = "https://github.com/picodata/pike", branch = "master" }
rstest = { version = "0.25.0"}
serde = { version = "1.0.219" }
rmp-serde = { version = "1.0.0" }
